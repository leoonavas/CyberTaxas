<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Cyber Taxas - Send Money</title>
    <link rel="stylesheet" href="css/buy.css" />
  </head>
  <body>
    <!-- Navbar -->
    <header>
      <div class="logo">Cyber Taxas</div>
      <nav>
        <a href="aboutUs.html">About us</a>
        <a href="#" class="active">Buy me a coffee</a>
        <a href="contato.html">Contact</a> 
      </nav>
    </header>

    <!-- Main content -->
    <main>
      <h1>Send <span>money</span></h1>
      <p>Support the Cyber Taxas project ☕</p>

      <div class="card">
        <!-- PIX -->
        <div class="pix-box">
          <label>PIX Key</label>
          <div class="pix-input">
            <input
              type="text"
              value="pix@cybertaxas.com"
              id="pixKey"
              readonly
            />
            <button onclick="copiarPix()">Copy</button>
          </div>
        </div>

        <div class="divider">or</div>

        <!-- QR Code -->
        <div class="qr-box">
          <p class="qr-title">Scan the QR Code</p>

          <img
            src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=pix@cybertaxas.com"
            alt="QR Code"
          />

          <small>Scan with your bank app</small>
        </div>

        <p class="safe">100% secure payment</p>
      </div>

      <p class="thanks">💚 Thank you for your support!</p>
    </main>

    <script src="js/buy.js"></script>
  </body>
</html>
