<!doctype html> 
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | CyberTaxas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet" />
    
    <link rel="stylesheet" href="css/contact.css" />
  </head>
  <body>

    <img src="imgs/bg-tellus.png" alt="Background Cosmos" class="bg-image" />

    <div class="page-container">
      
      <header class="header">
        <div class="logo">
          <a href="index.html" class="brand-logo">CyberTaxas</a>
        </div>
        <nav class="links">
          <a href="aboutUs.html">About us</a>
          <a href="buyMeAcoffe.html">Buy me a coffe</a>
          <a href="contact.html" class="active">Contact</a>
        </nav>

        <div class="login-buttons">
          <a href="login.html">
            <button class="btn btn-secondary">Login</button>
          </a>
          <a href="register.html">
            <button class="btn btn-primary">Register</button>
          </a>
        </div>
      </header>

      <main class="contact-wrapper">
        <div class="login-container">
          <header class="form-header">
            <h1 class="hero-title">Tell Us</h1>
            <p class="hero-subtitle">Our team is ready for answer you.</p>
          </header>

          <form class="form" action="#" method="POST">
            <div class="form-group">
              <input type="text" placeholder="Full Name" required />
            </div>

            <div class="form-group">
              <input type="email" placeholder="email@example.com" required />
            </div>

            <div class="form-group">
              <textarea placeholder="Type Message Here..." rows="5" required></textarea>
            </div>

            <button type="submit" class="btn-submit">Send Message</button>
          </form>
        </div>
      </main>

    </div>
  </body>
</html>
