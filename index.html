<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CyberTaxas | Elevate Your Knowledge</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="bg-glow"></div>

    <main class="land-page">
      <header class="header">
        <nav class="links">
          <a href="#">About us</a>
          <a href="#">Buy me a coffe</a>
          <a href="#">Contact</a>
        </nav>
        <div class="login-buttons">
          <button class="btn btn-secondary" onclick="abrirLogin()">
            Login
          </button>
          <a href="register.html">
            <button class="btn btn-primary">Register</button>
          </a>
        </div>
      </header>

      <section class="main-brand">
        <h1 class="headline">
          Elevate your knowledge with Cyber<span
            style="color: rgb(56, 255, 189)"
            >Taxas</span
          >
        </h1>
        <p class="subheadline">
          The best free platform. And the only one that helps you invest your
          money the right way.
        </p>
        <button class="btn btn-secondary button">Explore Now</button>
      </section>

      <section class="visual-composition">
        <div class="floating-card card-left">
          <div class="card-header">
            <span class="card-title">Most Increased Value</span>
          </div>
          <h2 class="card-number">BTC</h2>
        </div>

        <div class="terra-video">
          <video autoplay muted loop playsinline class="coin-video">
            <source src="background.mp4" type="video/mp4" />
          </video>
        </div>

        <div class="floating-card card-right">
          <div class="card-header">
            <span class="card-title">Last Update</span>
          </div>
          <h2 class="card-number">Today</h2>
        </div>
      </section>
    </main>

    <script src="js/scripts.js"></script>
  </body>
</html>
