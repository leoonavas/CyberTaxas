<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CyberTaxas - Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <div class="container">
      
    <video autoplay loop muted playsinline class="video-bg">
      <source src="videos/login-bg.mp4" type="video/mp4" />
    </video>

      <main class="login-container">
        <header class="header">
          <h1 class="hero-title">Welcome Back</h1>
          <p class="hero-subtitle">
            Log in with an account you've already created to access CyberTaxas
          </p>
        </header>

        <form class="form" action="#" method="POST">
          <div class="form-group">
            <input type="email" placeholder="seu-email@example.com" required />
          </div>

          <div class="form-group">
            <input type="password" placeholder="••••••••" required />
          </div>

          <button type="submit" class="btn btn-submit">Continue</button>

          <div class="divider">
            <span>OR</span>
          </div>

          <div class="social-links">
            <button type="button" class="btn-social">
              <img
                src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg"
                alt="Google Logo"
              />
            </button>
          </div>
        </form>
      </main>

      <section class="hero">
        <img
          class="hero-image"
          src="imgs/ChatGPT Image Jun 2, 2026, 08_25_26 AM.png"
          alt="Dashboard de Investimentos no Celular"
        />
      </section>
    </div>

    <script src="js/login.js"></script>
  </body>
</html>
