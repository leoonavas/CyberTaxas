<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cyber Taxas</title>
  <link rel="stylesheet" href="css/market.css">
</head>

<body>

<header class="navbar">
  <h1 class="logo">Cyber Taxas</h1>
</header>

<main class="container">

  <!-- ESQUERDA -->
  <section class="news">
    <h2>LAST NEWS</h2>

    <div class="news-item">1. Bitcoin surpasses US$100,000.00</div>
    <div class="news-item">2. Tesla buy more Bitcoin</div>
    <div class="news-item">3. Fed keeps interest rate unchanged.</div>
    <div class="news-item">4. Ethereum presents new update</div>
  </section>

  <!-- DIREITA -->
  <section class="market">
    <h2>Market Today</h2>

    <div class="cards">

      <div class="card btc">
        <img src="imgs/Frame 12.png" alt="BTC">
      </div>

      <div class="card eth">
        <img src="imgs/Frame 13.png" alt="ETH">
      </div>

      <div class="card sp">
        <img src="imgs/Frame 10.png" alt="S&P 500">
      </div>

      <div class="card nasdaq">
        <img src="imgs/Frame 11.png" alt="Nasdaq">
      </div>

    </div>
  </section>

</main>


</body>
</html>
